  <!-- Text inside house -->
  <text x="100" y="118" font-family="'Work Sans', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="28" fill="#3aa1f8" text-anchor="middle" letter-spacing="-0.5">JACOB</text>
  <text x="100" y="143" font-family="'Work Sans', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="22" fill="#3aa1f8" text-anchor="middle" letter-spacing="-0.5">BUYS</text>
  <text x="100" y="165" font-family="'Work Sans', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="22" fill="#3aa1f8" text-anchor="middle" letter-spacing="-0.5">YOUR</text>
  <text x="100" y="187" font-family="'Work Sans', 'Arial Black', Arial, sans-serif" font-weight="900" font-size="22" fill="#3aa1f8" text-anchor="middle" letter-spacing="-0.5">HOUSE</text>
